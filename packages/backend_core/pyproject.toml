[project]
name = "production-ready-backend-core"
version = "0.1.0"
description = "Shared FastAPI infrastructure (app factory, settings base, JSON logging, health/ready, metrics, request-context, error envelope, pagination, CORS) for the No.1 Production Ready product family (RAG / NL2SQL / Agent)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
  "fastapi>=0.121,<1.0",
  "starlette>=1.0.1,<2.0",
  "pydantic>=2.11",
  "pydantic-settings>=2.7",
  "python-json-logger>=4.0",
  "prometheus-client>=0.24",
]

[dependency-groups]
dev = [
  "httpx==0.28.1",
  "pytest>=8.3",
  "pytest-asyncio>=0.25",
  "pytest-cov>=6.0",
  "ruff>=0.9",
  "black>=25.1",
  "mypy>=1.14",
  "bandit>=1.8",
  "pip-audit>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pr_backend_core"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-q"
