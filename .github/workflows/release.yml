name: Release

# 「安定後に file: → GitHub Packages へ切替」用のリリースワークフロー。
# vX.Y.Z タグを push すると @engchina/production-ready-ui を GitHub Packages へ publish する。
# 各アプリは package.json を file: → "^X.Y.Z" に変更し、.npmrc で当該 registry を参照する。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js (GitHub Packages registry)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@engchina"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # タグ vX.Y.Z と package.json の version 不一致を早期に検出する。
      - name: Verify tag matches package version
        working-directory: packages/ui
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag ($TAG_VERSION) と package.json version ($PKG_VERSION) が不一致です"
            exit 1
          fi

      - name: Publish
        working-directory: packages/ui
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
