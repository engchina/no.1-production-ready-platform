name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & typecheck (@engchina/production-ready-ui)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (dist/index.js + d.ts + tokens.css)
        run: npm run build

      # dist が公開契約どおり生成されたことを確認する。
      - name: Verify dist artifacts
        run: |
          test -f packages/ui/dist/index.js
          test -f packages/ui/dist/index.d.ts
          test -f packages/ui/dist/tokens.css

  backend-core:
    name: Build & test (production-ready-backend-core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend_core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: packages/backend_core/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Format check
        run: uv run black --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src

      - name: Test
        run: uv run pytest --cov=pr_backend_core

      - name: Security scan
        run: uv run bandit -r src

      - name: Dependency audit
        run: uv run pip-audit
